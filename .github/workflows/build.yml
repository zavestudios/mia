name: Build and Push Container

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build Container Image
    uses: zavestudios/platform-pipelines/.github/workflows/container-build.yml@660aed58a3bf8413f23df0da545650de9b11b7fc
    with:
      image_name: zavestudios/mia
      dockerfile: Dockerfile
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
