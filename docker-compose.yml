services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/mia_dev
      DEBUG: "true"
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python main.py

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mia_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/mia_test
    depends_on:
      db:
        condition: service_healthy
    command: pytest
    profiles:
      - test

volumes:
  postgres_data:
